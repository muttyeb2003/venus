name: Test Suite

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage
          if-no-files-found: ignore
          retention-days: 30

      - name: Tests summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Tests passed for commit \`${{ github.sha }}\`." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed for commit \`${{ github.sha }}\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Re-run locally with: \`npm test -- --coverage\`" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d coverage ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage artifact: \`coverage-${{ github.sha }}\` (retention: 30 days)" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No coverage directory found (check Jest coverage config)." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Annotate test failures
        if: failure()
        run: |
          echo "::error::Tests failed. Check logs above. Re-run locally with: npm test -- --coverage"
